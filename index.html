<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBuddy Assistant | Matrix Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div id="authScreen" class="auth-container">
        <div class="matrix-box">
            <div class="matrix-glow"></div>
            <h2 class="matrix-title">MATRIX SİSTEM GİRİŞİ</h2>
            <p class="matrix-subtitle">CodeBuddy Veri Motoruna Bağlanmak İçin Kimlik Doğrulayın</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="usernameInput">KULLANICI ADI</label>
                    <input type="text" id="usernameInput" placeholder="admin" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="passwordInput">SİSTEM ŞİFRESİ</label>
                    <input type="password" id="passwordInput" placeholder="••••••••" required>
                </div>
                <button type="submit" id="loginBtn" class="matrix-btn">
                    <span>SİSTEME BAĞLAN</span>
                </button>
            </form>
        </div>
    </div>

    <div id="dashboardScreen" class="dashboard-container hidden">
        <header class="main-header">
            <h1 class="logo">CODEBUDDY <span>ASSISTANT</span></h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Terim ara veya yeni ekle... (Örn: C# DÖNGÜLER)">
                <button id="searchBtn">SORGULA</button>
            </div>
        </header>

        <main class="content-layout">
            <aside class="sidebar">
                <h3>SİSTEMDEKİ KAVRAMLAR</h3>
                <div id="termsGrid" class="chips-container"></div>
            </aside>

            <section class="main-content">
                <div id="introSection" class="matrix-card placeholder-card">
                    <p>🤖 Veri motoru aktif. İncelemek istediğiniz yazılım kavramını soldan seçin veya yukarıdan sorgulayın.</p>
                </div>

                <div id="termDetailCard" class="matrix-card hidden">
                    <h2 id="termTitle">Terim Başlığı</h2>
                    <p id="termDesc" class="short-desc">Kısa açıklama...</p>
                    
                    <div class="code-wrapper">
                        <div class="code-header">KOD SİMÜLASYONU</div>
                        <pre><code id="codeBlock"></code></pre>
                    </div>

                    <div class="output-wrapper">
                        <div class="output-header">SİSTEM ÇIKTISI</div>
                        <pre><code id="outputBlock"></code></pre>
                    </div>

                    <div class="card-actions">
                        <button id="addFavBtn" class="action-btn">⭐ Favoriye Ekle</button>
                        <button id="deepLearnBtn" class="action-btn premium-btn">👁️ Derinlemesine İncele</button>
                    </div>

                    <div id="termDeepDesc" class="deep-desc-box hidden"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

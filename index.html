<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBuddy - AI Kod Asistanı</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="authBox" class="auth-container">
        <h2 id="authTitle">Giriş Yap</h2>
        <div class="input-group">
            <label>E-posta Adresi</label>
            <input type="email" id="emailInput" placeholder="ornek@mail.com">
        </div>
        <div class="input-group">
            <label>Şifre</label>
            <input type="password" id="passwordInput" placeholder="••••••••">
        </div>
        <button id="mainAuthBtn" class="auth-btn">Giriş Yap</button>
        <p id="toggleAuth" class="switch-mode">Hesabın yok mu? Kayıt Ol</p>
    </div>

    <div id="appBox" class="app-container hidden">
        
        <div class="header-area">
            <div class="logo-box">&lt;/&gt;</div>
            <div class="title-box">
                <h1>CodeBuddy</h1>
                <p>AI destekli kod asistanı</p>
            </div>
        </div>

        <div class="search-box-wrapper">
            <input type="text" id="queryInput" class="search-input" placeholder="🔍 Bir kod terimi yaz... (örn: C# döngüler)">
        </div>
        
        <button id="searchBtn" class="query-btn">✨ SORGULA</button>

        <div class="bot-icon">🤖</div>
        
        <div class="info-text">
            <h3>Ne öğrenmek istiyorsun?</h3>
            <p>Bir kod terimi veya kavram yaz, sana arkadaşın gibi detaylıca açıklayayım.</p>
        </div>

        <div class="tags-container">
            <div class="tag" onclick="useTag('C# döngüler')">C# döngüler</div>
            <div class="tag" onclick="useTag('HTML div')">HTML div</div>
            <div class="tag" onclick="useTag('CSS flexbox')">CSS flexbox</div>
            <div class="tag" onclick="useTag('Python Liste')">Python Liste</div>
            <div class="tag" onclick="useTag('JavaScript async')">JavaScript async</div>
            <div class="tag" onclick="useTag('SQL JOIN')">SQL JOIN</div>
            <div class="tag" onclick="useTag('React hooks')">React hooks</div>
            <div class="tag" onclick="useTag('Git commit')">Git commit</div>
        </div>

        <div id="resultCard" class="response-card hidden"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
